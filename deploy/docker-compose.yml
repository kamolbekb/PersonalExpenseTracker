# Personal Expense Tracker — app on one Linux box (home server or a VM like Hetzner),
# database hosted on Supabase Postgres. Exposed worldwide via a Cloudflare Tunnel
# (outbound-only — no port-forwarding, no static IP).
#
#   cd <repo-root>
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
#
# Only `cloudflared` talks inbound from the internet. The database lives on Supabase,
# reached over TLS — there is no local Postgres container to run or back up.
#
# Secrets and the Supabase connection string come from deploy/.env (git-ignored).
# They're passed to the container via `env_file` so values containing ';' '=' or '$'
# (common in connection strings) are taken literally, not interpolated by Compose.

name: expense

services:
  expense-api:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    # Reads ConnectionStrings__Default, BotToken and Rates__RefreshToken from deploy/.env.
    # Variable names there match the container env vars exactly (no remapping needed).
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # The image already sets this; repeated here so the listening port is obvious.
      ASPNETCORE_URLS: http://+:8080

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - expense-api
